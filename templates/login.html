<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — Studforge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 500px;
      background: radial-gradient(circle, rgba(249,115,22,.12) 0%, transparent 65%);
      pointer-events: none;
    }
    .login-card {
      width: 360px;
      background: #121212;
      border: 1px solid #232323;
      border-radius: 16px;
      padding: 40px 34px 34px;
      text-align: center;
      animation: cardIn .45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }
    .logo-hex {
      width: 56px; height: 56px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(249,115,22,.35);
    }
    .logo-hex svg { color: #fff; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .sub {
      font-size: 12.5px;
      color: #8a8a8a;
      margin: 5px 0 28px;
    }
    .error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.32);
      color: #f87171;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 9px;
      margin-bottom: 16px;
    }
    input[type="password"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2c2c2c;
      border-radius: 10px;
      padding: 13px 15px;
      color: #fff;
      font-family: inherit;
      font-size: 14.5px;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    input[type="password"]:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,.14);
    }
    button {
      width: 100%;
      margin-top: 14px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .22s;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(249,115,22,.32);
    }
    button:active { transform: translateY(0) scale(.98); }
    .foot {
      margin-top: 24px;
      font-size: 11.5px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-hex">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
        <line x1="12" y1="2" x2="12" y2="22"/>
        <line x1="2" y1="8.5" x2="22" y2="8.5"/>
        <line x1="2" y1="15.5" x2="22" y2="15.5"/>
      </svg>
    </div>
    <h1>STUDFORGE</h1>
    <div class="sub">3D Manufaktur — Anmeldung</div>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <form method="post">
      <input type="password" name="password" placeholder="Passwort" autofocus required>
      <button type="submit">Anmelden</button>
    </form>

    <div class="foot">Studforge v1.0</div>
  </div>
</body>
</html>
